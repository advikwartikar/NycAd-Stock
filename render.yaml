$content = @"
services:
  - type: web
    name: nycad-stock-trading
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: SPRING_PROFILE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: stock-trading-db
          property: connectionString

databases:
  - name: stock-trading-db
    databaseName: stocktrading
    region: oregon
    plan: free
"@