services:
  - type: web
    name: nycad-stock-trading
    runtime: java
    region: oregon
    plan: free
    buildCommand: mvn clean install -DskipTests
    startCommand: java -jar target/stock-trading-app-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_PROFILE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: stock-trading-db
          property: connectionString
    
databases:
  - name: stock-trading-db
    databaseName: stocktrading
    region: oregon
    plan: free