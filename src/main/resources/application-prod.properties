# Production Profile - PostgreSQL

# Database (Production)
# Prefer JDBC_DATABASE_URL if present; otherwise build URL from host/port/db env vars.
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:stocktrading}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USER:${DATABASE_USERNAME:postgres}}
spring.datasource.password=${DATABASE_PASSWORD}

# JPA Settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Connection Pool (Production optimized)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Disable H2 console in production
spring.h2.console.enabled=false
