# Production Profile - PostgreSQL

# Database (Production)
# Require real database env vars in production.
# Option 1: set JDBC_DATABASE_URL (full jdbc:postgresql://... URL)
# Option 2: set DATABASE_HOST, DATABASE_PORT, DATABASE_NAME
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USER:${DATABASE_USERNAME}}
spring.datasource.password=${DATABASE_PASSWORD}

# JPA Settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Connection Pool (Production optimized)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Disable H2 console in production
spring.h2.console.enabled=false
