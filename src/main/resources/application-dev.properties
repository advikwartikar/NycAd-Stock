## 📁 How Spring Boot Profiles Work:
```
When you run the app:

1. Spring loads: application.properties (base config)
2. Then loads: application-{profile}.properties (overrides)

Examples:
- SPRING_PROFILE=prod → loads application-prod.properties
- SPRING_PROFILE=dev  → loads application-dev.properties

Render sets: SPRING_PROFILE=prod
So it loads: application.properties + application-prod.properties