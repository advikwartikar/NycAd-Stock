# Server Configuration
server.port=${PORT:8080}

# Active Profile
spring.profiles.active=${SPRING_PROFILE:prod}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# PostgreSQL Configuration
# Render provides postgresql:// format, we need jdbc:postgresql://
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/stocktrading}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# Fallback: Add dialect explicitly if auto-detection fails
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect